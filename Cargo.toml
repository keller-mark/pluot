[package]
name = "pluot"
version = "0.1.0"
authors = ["mkeller <7525285+keller-mark@users.noreply.github.com>"]
edition = "2018"
rust-version = "1.92"
exclude = ["data", "js", "python", "python-notebooks", "dev-docs", "webgpu-playground", "node_modules"]
categories = ["visualization", "graphics", "rendering", "science", "wasm"]
keywords = []

# Reference: https://drager.github.io/wasm-pack/book/cargo-toml-configuration.html
[package.metadata.wasm-pack.profile.release]
wasm-opt = ['-Oz']

[lib]
name = "pluot"
crate-type = ["cdylib", "rlib"]

[features]
default = []
# Define features to toggle which dependency is active
python = ["pyo3", "pyo3-async-runtimes", "pythonize", "tokio", "pyo3-log"]
test_plain_rust = ["tokio"] # TODO: instead of this feature, can tokio be moved to dev-dependencies, even though it is also needed for the python feature?

[dependencies]

# Python-specific dependencies
pyo3 = { version = "0.27", optional = true, features = ["extension-module"] }
pyo3-async-runtimes = { version = "0.27", features = ["tokio-runtime"], optional = true }
pythonize = { git = "https://github.com/tuxu/pythonize.git", rev = "6140fe0", optional = true }
pyo3-log = { version = "0.13.2", optional = true }
# tokio is also used for the test_plain_rust feature. "full" is needed for its testing utilities.
tokio = { version = "1.47.1", features = ["full"], optional = true }


# Core dependencies
log = "~0.4" # TODO: make this python-specific, if continues to only be used in python bindings?
bytemuck = "1.23.2"
futures = "0.3.31"
futures-intrusive = "0.5"
once_cell = "1.21.3"
# We can use serde to deserialize JSON object parameters passed to the `render` function.
# Reference: https://docs.rs/serde-wasm-bindgen/latest/serde_wasm_bindgen/
serde = { version = "1.0.x", features = ["derive"] }
# For zarrs: not using features "filesystem", "blosc", or "zstd" for zarrrs.
# Zstd and Blosc caused wasm-pack compilation to fail during usage of Snappy compression library.
# We need to specify uuid with feature "js", which is used by zarrrs.
uuid = { version = "1", features = ["v4", "js"] }
# Zarrs (ea23432)
zarrs = { version = "0.22.10", default-features = false, features = [
    "ndarray",
    "crc32c",
    "gzip",
    "sharding",
    "transpose",
    "async",
    # "filesystem", # was working under zarrs_filesystem v0.3.8, stopped working in zarrs_filesystem v0.3.9
] }
async-trait = "0.1.74"
quick_cache = "0.6.16"
svg = "0.18.0"
futures-time = { git = "https://github.com/keller-mark/futures-time.git", rev = "c61a0dd" }

# For OME-Zarr image metadata parsing.
# We use this fork which relaxes things by not using serde(deny_unknown_fields).
ome_zarr_metadata = { git = "https://github.com/keller-mark/ome_zarr_metadata.git", branch = "keller-mark/relaxed-ome-fields" }
serde_json = "1.0.143"

# WebGPU
wgpu = { version = "28.0.0" }
glam = { version = "0.30.8", features = ["encase"] }
encase = { version = "0.12.0" }

# Matrix multiplication for SVG rendering
nalgebra-glm = "0.3"

# Trying vello for shape/text rendering.
# Vello (65eea2c4)
# vello = { git = "https://github.com/linebender/vello.git", rev = "2e96026" }
# # Add wgpu as a direct dependency to enable the webgl feature. This is still not working in Firefox/Safari.
# # wgpu = { version = "26.0.1", features = ["webgl"] }
# # From https://github.com/linebender/vello/blob/main/Cargo.toml
# # Metadata reader and glyph scaler for OpenType fonts.
# skrifa = { version = "0.36.0", default-features = false, features = [
#     "autohint_shaping",
# ] }
# # Primitive types for styling vector graphics.
# # The version of kurbo used below should be kept in sync with the version of kurbo used by peniko.
# peniko = { version = "0.4.0", default-features = false }
# # A Rust library for manipulating curves.
# kurbo = { version = "0.11.3", default-features = false }

# Trying VGER for shape/text rendering.
vger = { git = "https://github.com/keller-mark/vger-rs.git", rev = "b579608" }
euclid = "0.22.11"
fontdue = "0.9.x"

# Trying glyphon for text rendering.
# glyphon = "0.9.0"


# For testing with local modified version of the rust-blosc-src crate.
#blosc-src = { path = "../rust-blosc-src" }

# WASM-specific dependencies
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { version = "0.2.106" }
wasm-bindgen-futures = { version = "0.4.56" }
wasm-bindgen-shared = { version = "0.2.106" }
web-sys = { version = "0.3.77" }
js-sys = { version = "0.3.77" }
serde-wasm-bindgen = { version = "0.6.5" }
# The `console_error_panic_hook` crate provides better debugging of panics by
# logging them with `console.error`. This is great for development, but requires
# all the `std::fmt` and `std::panicking` infrastructure, so isn't great for
# code size when deploying.
console_error_panic_hook = { version = "0.1.7" }


# Fixes for getrandom. May not be necessary here if added to upstream zarrs config.toml.
# Reference: https://github.com/kylebarron/parquet-wasm/blob/ad18b841a8e788b0d4b17eb9deaca581d02bf887/Cargo.toml#L100C1-L110C18
[target.'cfg(target_arch = "wasm32")'.dependencies.getrandom_v03]
package = "getrandom"
version = "0.3"
features = ["wasm_js"]

[target.'cfg(target_arch = "wasm32")'.dependencies.getrandom_v02]
package = "getrandom"
version = "0.2"
features = ["js"]


[dev-dependencies]
wasm-bindgen-test = "0.3.34"

[profile.release]
# Tell `rustc` to optimize for small code size.
opt-level = "s"

# Enable link-time optimization.
# This gives LLVM many more opportunities to inline and prune functions.
# Not only will it make the .wasm smaller, but it will also make it faster at runtime!
# The downside is that compilation will take longer.
# Reference: https://rustwasm.github.io/book/reference/code-size.html
lto = true

# Enable "codegen-units = 1" to tell `rustc` to optimize the whole crate at once.
# This also gives LLVM more opportunities to inline and prune functions.
# This will make the .wasm smaller and faster, but will also make compilation even longer
codegen-units = 1

# During development, we do not care about unused variable or unused import warnings. TODO: remove this eventually.
[lints.rust]
unused = "allow"
