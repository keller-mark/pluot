[package]
name = "pluot"
version = "0.1.0"
authors = ["mkeller <7525285+keller-mark@users.noreply.github.com>"]
edition = "2018"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["console_error_panic_hook"]

[dependencies]
wasm-bindgen = "0.2.84"
wasm-bindgen-futures = "0.4.50"
# wgpu = "25"
bytemuck = "1.23.2"
web-sys = "0.3.x"
js-sys = "0.3.x"
futures-intrusive = "0.5"

vello = "0.5"  # enable the wgpu integration
# From https://github.com/linebender/vello/blob/main/Cargo.toml
skrifa = "0.31.0"
# The version of kurbo used below should be kept in sync
# with the version of kurbo used by peniko.
peniko = "0.4.0"
# FIXME: This can be removed once peniko supports the schemars feature.
kurbo = "0.11.3"

# The `console_error_panic_hook` crate provides better debugging of panics by
# logging them with `console.error`. This is great for development, but requires
# all the `std::fmt` and `std::panicking` infrastructure, so isn't great for
# code size when deploying.
console_error_panic_hook = { version = "0.1.7", optional = true }

[dev-dependencies]
wasm-bindgen-test = "0.3.34"

[profile.release]
# Tell `rustc` to optimize for small code size.
opt-level = "s"
