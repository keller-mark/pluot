</text>
<text dominant-baseline="middle" fill="rgb(0, 0, 0)" font-family="Helvetica" font-size="12" font-style="normal" font-weight="normal" opacity="1" text-anchor="middle" transform="rotate(45 50 0)" x="50" y="0">
