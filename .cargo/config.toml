[target.wasm32-unknown-unknown]
rustflags = [
    # Fixes for getrandom. May not be necessary here if added to upstream zarrs config.toml.
    # Reference: https://github.com/kylebarron/parquet-wasm/blob/ad18b841a8e788b0d4b17eb9deaca581d02bf887/.cargo/config.toml#L2
    '--cfg', 'getrandom_backend="wasm_js"',

    # In order to use wasm-bindgen-rayon, need to enable the following features
    # (currently only supported on nightly versions of rust).
    # We are not currently using wasm-bindgen-rayon, but may want to use it in the future.
    # References:
    # - https://github.com/RReverser/wasm-bindgen-rayon?tab=readme-ov-file#using-config-files
    # - https://github.com/rust-lang/rust/issues/77839
    # "-C", "target-feature=+atomics,+bulk-memory", # Note: currently need to use a nightly version of rust to use +atomics; See rust-toolchain.toml for details.

    # After upgrade to rustc 1.92 (I think this is what caused it), need the following flags:
    # References:
    # - https://github.com/huggingface/xet-core/issues/554#issuecomment-3488260311
    # - https://github.com/wasm-bindgen/wasm-bindgen/pull/4717
    # "-C", "link-arg=--shared-memory", # Note: +atomics is needed above in order to use --shared-memory here.
    # "-C", "link-arg=--max-memory=1073741824",
    # "-C", "link-arg=--import-memory",
    # "-C", "link-arg=--export=__wasm_init_tls",
    # "-C", "link-arg=--export=__tls_size",
    # "-C", "link-arg=--export=__tls_align",
    # "-C", "link-arg=--export=__tls_base",
]

[unstable]
# Probably not necessary, as not using wasm-rayon-bindgen, but may use it in the future.
# Reference: https://github.com/RReverser/wasm-bindgen-rayon?tab=readme-ov-file#using-config-files
build-std = ["panic_abort", "std"]
