<!DOCTYPE html>
<html>
  <head>
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type"/>
  </head>
  <body>
    <div id="root"></div>
    <!-- Note the usage of `type=module` here as this is an ES6 module -->
    <script type="module">
      // Use ES module import syntax to import functionality from the module
      // that we have compiled.
      //
      // Note that the `default` import is an initialization function which
      // will "boot" the module and make it ready to use. Currently browsers
      // don't support natively imported WebAssembly as an ES module, but
      // eventually the manual initialization won't be required!
      import * as wasm from '/pkg/wasm_game_of_life.js';
      
      await wasm.default();
      await wasm.set_panic_hook();

      

      // Render to a canvas
      const width = 1000;
      const height = 1000;
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      document.getElementById('root').appendChild(canvas);
      const ctx = canvas.getContext('2d');


      // Render once or every animation frame.
      const renderOnce = true;
      const replaceDataEachFrame = true;

      function replaceData() {
        // Register some example data
        const n = 10000;
        const xs = new Int32Array(n);
        const ys = new Int32Array(n);
        for (let i = 0; i < n; i++) {
          xs[i] = (Math.random()) * 1000.0;
          ys[i] = (Math.random()) * 1000.0;
        }
        wasm.register_data("x", xs);
        wasm.register_data("y", ys);
      }
      
      // Define the function to render a single frame.
      function renderFrame() {
        if (replaceDataEachFrame) {
          replaceData();
        }

        wasm.render(width, height).then(arr => {
          const imageData = new ImageData(new Uint8ClampedArray(arr), width, height);
          ctx.putImageData(imageData, 0, 0);
        });
      }
      function animate() {
        renderFrame();
        requestAnimationFrame(animate);
      }

      // Initialize data and kick off the first render.
      replaceData();
      if(renderOnce) {
        renderFrame();
      } else {
        requestAnimationFrame(animate);
      }

    </script>
  </body>
</html>
