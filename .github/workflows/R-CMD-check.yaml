# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    paths:
      - 'bindings-r/**'
      - 'crates/**'
      - '.github/workflows/R-CMD-check.yaml'
  pull_request:
    paths:
      - 'bindings-r/**'
      - 'crates/**'
      - '.github/workflows/R-CMD-check.yaml'

name: R-CMD-check

jobs:
  R-CMD-check:
    # macOS runner: GPU (Metal) available for rendering tests; LLVM workaround for
    # the -mmacosx-version-min=26.1 C++ stdlib issue in cc-rs.
    runs-on: macos-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings-r/src/pluotr_rs -> target

      # Required by pluotr's Makevars to compile C++ dependencies (snappy/blosc)
      # when MACOSX_DEPLOYMENT_TARGET is set to a macOS 26.x SDK version.
      - name: Install LLVM
        run: brew install llvm

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # pizzarr >= 0.2.0 is required for zarr_format = 3L support.
      # The CRAN source package fails to compile on macOS (same C++ stdlib issue
      # as pluotr itself). Install the pure-R tarball from r-universe instead,
      # before setup-r-dependencies runs so pak sees it as already satisfied.
      - name: Install pizzarr from r-universe
        run: |
          tmp=$(mktemp /tmp/pizzarr_XXXXXX.tar.gz)
          curl -fL "https://zarr-developers.r-universe.dev/src/contrib/pizzarr_0.2.0.tar.gz" \
            -o "$tmp"
          Rscript -e "install.packages('$tmp', repos = NULL, type = 'source')"

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
          working-directory: bindings-r

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          working-directory: bindings-r
        env:
          MAKEFLAGS: -j4
